# GemSMP config
#
# この config.yml は hub・smp 両方の plugins/GemSMP に置きます。
# hub/smp間のプレイヤーデータ(所持金・インベントリ・エンチェ・HP等)の共有は
# 下の database (MySQL) が担当します。smp_data.yml はsmpサーバーだけに置けばOKです。

# サーバーの役割。Docker等でポート判別が効かない環境では必ず明示してください。
#   smp = サバイバルサーバー (Folia / world, world_nether, world_the_end)
#   hub = ハブサーバー (Purpur / hubワールド)
mode: smp

# ポートによる自動判別
# hub: 161.33.24.132:10000 / smp: 172.235.215.252:39384
hub-port: 10000
smp-port: 39384

# hubモード時に使用するハブワールド名 (見つからない場合はメインワールドを使用)
hub-world: hub

velocity:
  # Velocityプロキシ連携 (false にすると旧来の単一サーバー動作)
  enabled: true
  # velocity.toml の [servers] に登録した名前
  hub-server: hub
  smp-server: smp
  # Velocity側 plugins/gemsmp/config.properties の secret と同じ値にする
  # (クライアントからの偽装メッセージ対策。必ず設定推奨)
  secret: ""

# MySQL連携 — hub/smp間のプレイヤーデータ共有(所持金・インベントリ・エンチェ・HP・
# 満腹度・経験値・AH一覧など)に必須。両サーバーから同じMySQLに接続できるように設定する。
# hubとsmpの両方の config.yml で enabled: true + 同じ接続情報にすること。
database:
  enabled: true
  host: localhost        # MySQLサーバーのアドレス (別マシンからはそのマシンのIPを指定)
  port: 3306
  database: gemsmp
  username: root
  password: ''
